<div class="login-page">
  <div class="login-box">

    <!-- Logo -->
    <a routerLink="/" class="login-logo" aria-label="FalconFind – Home">
      <img src="/PNG/LogoPrincipal.png" alt="FalconFind" style="height: 32px; width: auto;" />
    </a>

    <h1 class="login-title">Welcome back</h1>
    <p class="login-subtitle">Sign in to your FalconFind account</p>

    <!-- Error banner -->
    @if (errorMessage()) {
      <div class="login-error" role="alert">
        <svg style="width:16px;height:16px;flex-shrink:0;" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
        {{ errorMessage() }}
      </div>
    }

    <form [formGroup]="form" (ngSubmit)="submit()" novalidate>

      <app-form-field id="email" label="Email" [required]="true" [error]="emailError">
        <app-input
          id="email"
          type="email"
          placeholder="you@example.com"
          formControlName="email"
          [invalid]="!!emailError"
        />
      </app-form-field>

      <app-form-field id="password" label="Password" [required]="true" [error]="passwordError">
        <div class="password-wrapper">
          <app-input
            id="password"
            [type]="showPassword() ? 'text' : 'password'"
            placeholder="Enter your password"
            formControlName="password"
            [invalid]="!!passwordError"
          />
          <button type="button" class="password-toggle" (click)="togglePassword()" [attr.aria-label]="showPassword() ? 'Hide password' : 'Show password'">
            @if (showPassword()) {
              <svg style="width:16px;height:16px;" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" />
              </svg>
            } @else {
              <svg style="width:16px;height:16px;" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
              </svg>
            }
          </button>
        </div>
      </app-form-field>

      <div class="login-forgot">
        <a routerLink="/forgot-password">Forgot your password?</a>
      </div>

      <button type="submit" class="login-submit-btn" [disabled]="isSubmitting()">
        @if (isSubmitting()) {
          <svg class="login-spinner" fill="none" viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" class="opacity-25"></circle>
            <path fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z" class="opacity-75"></path>
          </svg>
        }
        Sign in
      </button>

    </form>

    <p class="login-footer">
      Don't have an account? <a routerLink="/register">Register</a>
    </p>

  </div>
</div>
